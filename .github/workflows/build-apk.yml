name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Re-generate Android directory (fix Gradle issues)
      run: flutter create . --platforms=android --org com.example.little_kindness_rainbow -t app
      continue-on-error: true
        
    - name: Build APK (release)
      run: flutter build apk --release --dart-define=API_KEY=${{ secrets.API_KEY }} --verbose
      env:
        API_KEY: ${{ secrets.API_KEY }}
        
    - name: Upload APK as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: little-kindness-rainbow-v1.1
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build/
        retention-days: 7
