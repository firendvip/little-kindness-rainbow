name: Build Android APK (Clean Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        
    # Clean ALL build artifacts and caches
    - name: Clean all caches and build artifacts
      run: |
        rm -rf android
        rm -rf build
        rm -rf .gradle
        rm -rf ~/.gradle/caches
        flutter clean
        
    - name: Recreate Android directory (clean)
      run: flutter create --platforms=android .
      
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK (release)
      run: flutter build apk --release --dart-define=API_KEY=${{ secrets.API_KEY }}
      env:
        API_KEY: ${{ secrets.API_KEY }}
        
    - name: Upload APK as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: little-kindness-rainbow-v1.2
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-clean
        path: build/
        retention-days: 7
