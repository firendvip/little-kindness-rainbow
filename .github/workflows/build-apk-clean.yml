name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        
    - name: Remove and recreate android
      run: |
        rm -rf android build .gradle
        flutter create --platforms=android --project-name little_kindness_rainbow .
        
    - name: Write correct local.properties
      run: |
        FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
        echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
        echo "SDK path: $FLUTTER_SDK"
        cat android/local.properties
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Ensure local.properties before build
      run: |
        FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
        echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
        cat android/local.properties
        
    - name: Build APK (release)
      run: flutter build apk --release --dart-define=API_KEY=${{ secrets.API_KEY }}
      env:
        API_KEY: ${{ secrets.API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: little-kindness-rainbow-v1.3
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
