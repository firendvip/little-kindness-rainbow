name: Build Android APK (Clean Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        
    - name: Remove old Android directory
      run: rm -rf android
    
    - name: Recreate Android directory
      run: flutter create --platforms=android .
      
    - name: Fix Flutter SDK path in settings.gradle
      run: |
        FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
        echo "Flutter SDK path: $FLUTTER_SDK"
        echo "FLUTTER_ROOT from env: $FLUTTER_ROOT"
        if [ -f "android/settings.gradle" ]; then
          echo "--- Before fix ---"
          grep flutter_tools android/settings.gradle || echo "no flutter_tools found"
          sed -i "s|/packages/flutter_tools/gradle|$FLUTTER_SDK/packages/flutter_tools/gradle|g" android/settings.gradle
          echo "--- After fix ---"
          grep flutter_tools android/settings.gradle || echo "no flutter_tools found"
        fi
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK (release)
      run: flutter build apk --release --dart-define=API_KEY=${{ secrets.API_KEY }}
      env:
        API_KEY: ${{ secrets.API_KEY }}
        
    - name: Upload APK as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: little-kindness-rainbow-v1.2
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-clean
        path: build/
        retention-days: 7
