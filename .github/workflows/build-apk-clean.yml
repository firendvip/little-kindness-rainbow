name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.2'
        channel: 'stable'
        
    - name: Remove android directory and rebuild
      run: |
        rm -rf android build .gradle
        flutter create --platforms=android --project-name little_kindness_rainbow .
        
    - name: Overwrite settings.gradle with correct paths
      run: |
        FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
        echo "Flutter SDK: $FLUTTER_SDK"
        ls "$FLUTTER_SDK/packages/flutter_tools/gradle/" || echo "DIR NOT FOUND"
        
        # Write a correct settings.gradle
        cat > android/settings.gradle << 'GRADLE_EOF'
        include ':app'
        
        def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
        def properties = new Properties()
        
        if (localPropertiesFile.exists()) {
            properties.load(localPropertiesFile.newDataInputStream())
        }
        
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        
        includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
        
        apply from: "${flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle"
        GRADLE_EOF
        
        echo "--- settings.gradle ---"
        cat android/settings.gradle
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK (release)
      run: flutter build apk --release --dart-define=API_KEY=${{ secrets.API_KEY }}
      env:
        API_KEY: ${{ secrets.API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: little-kindness-rainbow-v1.2
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
