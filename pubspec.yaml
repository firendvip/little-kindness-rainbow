name: little_kindness_rainbow
description: 小善彩虹屁 - 小朋友专属彩虹屁生成器
publish_to: 'none'
version: 1.2.1+13

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  http: ^1.1.0
  
  # 本地存储（缓存 + 历史记录）
  shared_preferences: ^2.2.2
  
  # 分享功能
  share_plus: ^7.2.1
  
  # UI 增强
  flutter_svg: ^2.0.9
  
  # 动画
  lottie: ^2.7.0
  
  # 剪贴板
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # 如果需要本地资源
  assets:
    - assets/
